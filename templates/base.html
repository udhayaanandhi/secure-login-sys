<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login System</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Theme Colors */
            --iris-blue: #5d3fd3; /* Vibrant purple-blue */
            --icy-blue: #c7e5ff; /* Soft icy blue */
            --dark-bg: #0b0c10;
            --glass-bg: rgba(20, 25, 45, 0.4);
            --glass-border: rgba(199, 229, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --error-color: #ff4c4c;
            --success-color: #4caf50;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            font-family: 'Outfit', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Lively Background Animation */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: linear-gradient(120deg, var(--dark-bg), #1a1a2e, #16213e);
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 15s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--iris-blue);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--icy-blue);
            bottom: -50px;
            right: -50px;
            animation-duration: 20s;
        }
        
        .orb-3 {
            width: 250px;
            height: 250px;
            background: #2a0845; /* Deep purple blend */
            top: 40%;
            left: 50%;
            animation-duration: 18s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -30px) scale(1.1); }
            100% { transform: translate(-30px, 20px) scale(0.9); }
        }

        /* Glassmorphism Container */
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
            z-index: 10;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--icy-blue), var(--iris-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--icy-blue);
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--iris-blue);
            box-shadow: 0 0 10px rgba(93, 63, 211, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--iris-blue), #8b5cf6);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 4px 15px rgba(93, 63, 211, 0.4);
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(93, 63, 211, 0.6);
            background: linear-gradient(135deg, #6c4de6, #9b6cff);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--icy-blue);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* Links */
        .link-text {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .link-text span {
            color: var(--icy-blue);
            font-weight: 600;
        }

        .link-text:hover span {
            text-decoration: underline;
            color: white;
        }

        /* Flashed Messages */
        .flashes {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }

        .flashes li {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .flashes .error {
            background: rgba(255, 76, 76, 0.2);
            border: 1px solid rgba(255, 76, 76, 0.5);
            color: #ffcccc;
        }

        .flashes .success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
            color: #ccffcc;
        }
        
        .flashes .info {
            background: rgba(93, 63, 211, 0.2);
            border: 1px solid rgba(93, 63, 211, 0.5);
            color: #e0d4ff;
        }

        /* Info boxes */
        .info-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .info-box img {
            border-radius: 10px;
            border: 2px solid var(--icy-blue);
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="glass-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flashes">
            {% for category, message in messages %}
              <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
