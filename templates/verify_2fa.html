{% extends "base.html" %}

{% block content %}
    <h1>2-Factor Verification</h1>
    
    <div class="info-box" style="margin-bottom: 30px;">
        <p style="color: var(--icy-blue);">Your account is protected by 2FA.</p>
        <p>Please enter the 6-digit code from your authenticator app.</p>
    </div>

    <form action="{{ url_for('verify_2fa') }}" method="POST">
        <div class="form-group">
            <label for="token">Authentication Code</label>
            <input type="text" id="token" name="token" required autocomplete="off" placeholder="------" maxlength="6" pattern="\d{6}" style="text-align: center; letter-spacing: 5px; font-size: 1.2rem;">
        </div>
        <button type="submit" class="btn">Verify Identity</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('login') }}" class="link-text">Cancel Login</a>
    </div>
{% endblock %}
