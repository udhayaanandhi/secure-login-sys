{% extends "base.html" %}

{% block content %}
    <h1>Create an Account</h1>
    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username" placeholder="Choose a username">
            <small style="color: var(--text-muted); font-size: 0.8rem; margin-top: 5px; display: block;">Min 3 characters.</small>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Choose a secure password">
            <small style="color: var(--text-muted); font-size: 0.8rem; margin-top: 5px; display: block;">Min 6 characters.</small>
        </div>
        <button type="submit" class="btn">Register Securely</button>
    </form>
    
    <a href="{{ url_for('login') }}" class="link-text">Already have an account? <span>Login here</span></a>
{% endblock %}
